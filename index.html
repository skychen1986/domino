<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>多米诺3D · 解压</title>
<script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#111; touch-action:manipulation; user-select:none; -webkit-user-select:none; position:fixed; font-family:system-ui,-apple-system,sans-serif; }
  #c { display:block; position:absolute; top:0; left:0; z-index:1; }
  #ui-top { position:fixed; top:max(10px, env(safe-area-inset-top)); left:0; right:0; z-index:10; display:flex; justify-content:center; gap:6px; pointer-events:none; }
  #ui-top button { pointer-events:auto; border:none; border-radius:16px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; background:rgba(255,255,255,.12); color:rgba(255,255,255,.8); backdrop-filter:blur(10px); transition:all .12s; }
  #ui-top button:active { transform:scale(.94); }
  #ui-top button.sel { background:#ff6b35; color:#fff; }
  #hint { position:fixed; top:45%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,.3); font-size:15px; z-index:5; pointer-events:none; text-align:center; line-height:1.7; transition:opacity .3s; }
  #counter { position:fixed; top:max(50px, calc(env(safe-area-inset-top)+36px)); right:10px; color:rgba(255,255,255,.4); font-size:12px; font-family:monospace; z-index:10; pointer-events:none; }
  #btn-push { position:fixed; right:12px; bottom:max(88px, calc(env(safe-area-inset-bottom)+68px)); width:72px; height:72px; border-radius:50%; border:none; background:linear-gradient(135deg,#ff3b5c,#ff2d55); color:#fff; font-size:16px; font-weight:700; z-index:100; cursor:pointer; box-shadow:0 4px 24px rgba(255,45,85,.5); letter-spacing:1px; }
  #btn-push:active { transform:scale(.9); }
  #btn-clear { position:fixed; left:12px; bottom:max(88px, calc(env(safe-area-inset-bottom)+68px)); width:40px; height:40px; border-radius:50%; border:1.5px solid rgba(255,255,255,.2); background:rgba(0,0,0,.4); color:rgba(255,255,255,.5); font-size:14px; z-index:100; cursor:pointer; }
  #btn-undo { position:fixed; left:58px; bottom:max(88px, calc(env(safe-area-inset-bottom)+68px)); width:40px; height:40px; border-radius:50%; border:1.5px solid rgba(255,255,255,.2); background:rgba(0,0,0,.4); color:rgba(255,255,255,.5); font-size:14px; z-index:100; cursor:pointer; }
  #msg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-size:18px; font-weight:700; z-index:15; pointer-events:none; opacity:0; transition:opacity .3s; text-shadow:0 2px 10px rgba(0,0,0,.5); }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hint">👆 点击桌面放置多米诺骨牌<br><span style="font-size:12px;opacity:.7;">选尺寸 → 点桌面放置 → 选一张推</span></div>
<div id="counter">0 块</div>
<button id="btn-undo" onclick="undoLast()">↩</button>
<button id="btn-push" onclick="doPush()">推</button>
<button id="btn-clear" onclick="clearAll()">✕</button>
<div id="msg"></div>
<div id="ui-top">
  <button class="sel" onclick="setSize('s',this)">小</button>
  <button onclick="setSize('m',this)">中</button>
  <button onclick="setSize('l',this)">大</button>
  <button style="background:rgba(255,255,255,.06);" onclick="toggleGhost()">📏参考线</button>
</div>

<script>
// ─── 三种尺寸定义 ──────────────────────────
const SIZES = {
  s: { w:0.38, h:0.85, d:0.1, name:'小', color:0xf5f0e8, dotColor:0x1a1a1a },
  m: { w:0.50, h:1.10, d:0.14, name:'中', color:0xfaf5ed, dotColor:0x1a1a1a },
  l: { w:0.62, h:1.40, d:0.18, name:'大', color:0xfffaf2, dotColor:0x1a1a1a },
};
let curSize = 's';
let showGhost = true;

// ─── Three.js ──────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 8, 25);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 50);
camera.position.set(0, 4.5, 6.5);
camera.lookAt(0, 0, 0);

// 灯光
const ambient = new THREE.AmbientLight(0xffeedd, 0.8);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e8, 3.5);
sun.position.set(5, 10, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 40;
sun.shadow.camera.left = -8;
sun.shadow.camera.right = 8;
sun.shadow.camera.top = 8;
sun.shadow.camera.bottom = -3;
sun.shadow.bias = -0.0002;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xc8d0ff, 0.8);
fill.position.set(-2, 3, -2);
scene.add(fill);

// 桌面
const tableGeo = new THREE.BoxGeometry(6, 0.15, 8);
const tableMat = new THREE.MeshStandardMaterial({ color:0x1b5c3a, roughness:0.85, metalness:0.05 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.075;
table.receiveShadow = true;
table.castShadow = true;
scene.add(table);

// 桌面装饰线
const edgeGeo = new THREE.BoxGeometry(6.05, 0.02, 8.05);
const edgeMat = new THREE.MeshStandardMaterial({ color:0x2a1a0a, roughness:0.6 });
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.y = 0.005;
scene.add(edge);

// ─── 地面参考网格线 ────────────────────────
const gridHelper = new THREE.PolarGridHelper(3.5, 40, 20, 64, 0x3a7a5a, 0x3a7a5a);
gridHelper.position.y = 0.08;
scene.add(gridHelper);

// ─── 骨牌数据 ──────────────────────────────
let dominoes = [];
let selectedIdx = -1;
let falling = false;

// ─── 幽灵预览 ───────────────────────────────
let ghostGroup = null;
let ghostRing = null;

function createGhostMaterial() {
  return new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.3,
    metalness: 0.1,
    transparent: true,
    opacity: 0.35,
    depthWrite: false,
  });
}

function updateGhost() {
  // 移除旧预览
  if (ghostGroup) { scene.remove(ghostGroup); ghostGroup = null; }
  if (ghostRing) { scene.remove(ghostRing); ghostRing = null; }

  if (dominoes.length === 0 || falling) return;

  const last = dominoes[dominoes.length - 1];
  if (last.state !== 'standing') return;

  const s = SIZES[last.size];
  const optDist = s.h * 0.82; // 最佳间距

  // 幽灵位置：上一张牌前方最佳距离处
  const gx = last.baseX + Math.cos(last.facing) * optDist;
  const gz = last.baseZ + Math.sin(last.facing) * optDist;
  const maxDist = s.h * 0.92; // 最大压倒距离

  // 限制在桌面内
  const cx = THREE.MathUtils.clamp(gx, -2.8, 2.8);
  const cz = THREE.MathUtils.clamp(gz, -3.8, 3.8);

  // 创建幽灵骨牌
  ghostGroup = new THREE.Group();
  const geo = getGeo(s);
  const mat = createGhostMaterial();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = s.h / 2;
  ghostGroup.add(mesh);

  // 幽灵圆点
  const dotMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, transparent: true, opacity: 0.4, depthWrite: false });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.y = s.h - 0.15;
  dot.position.z = s.d / 2 + 0.005;
  ghostGroup.add(dot);

  ghostGroup.position.set(cx, 0, cz);
  ghostGroup.rotation.y = Math.PI/2 - last.facing;
  scene.add(ghostGroup);

  // 放置区：绿色内环=最佳距离，红色外环=最大距离（骨牌高度=压倒极限）
  const minR = optDist * 0.4;
  const maxR = s.h * 0.92; // 最大间距=骨牌高度92%

  const ringGeoInner = new THREE.RingGeometry(minR, minR + 0.04, 48);
  const ringMatInner = new THREE.MeshBasicMaterial({ color: 0x44ff88, side: THREE.DoubleSide, transparent: true, opacity: 0.4, depthWrite: false });
  const innerRing = new THREE.Mesh(ringGeoInner, ringMatInner);
  innerRing.rotation.x = -Math.PI/2;

  const ringGeoOuter = new THREE.RingGeometry(maxR, maxR + 0.04, 48);
  const ringMatOuter = new THREE.MeshBasicMaterial({ color: 0xff6644, side: THREE.DoubleSide, transparent: true, opacity: 0.35, depthWrite: false });
  const outerRing = new THREE.Mesh(ringGeoOuter, ringMatOuter);
  outerRing.rotation.x = -Math.PI/2;

  ghostRing = new THREE.Group();
  ghostRing.add(innerRing);
  ghostRing.add(outerRing);
  ghostRing.position.set(last.baseX, 0.085, last.baseZ);
  scene.add(ghostRing);
}

// 骨牌几何体缓存
const geoCache = {};
function getGeo(s) {
  const k = s.w+','+s.h+','+s.d;
  if (!geoCache[k]) geoCache[k] = new THREE.BoxGeometry(s.w, s.h, s.d);
  return geoCache[k];
}
const dotGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.02, 8);

function createDominoMat(s) {
  return new THREE.MeshStandardMaterial({ color:s.color, roughness:0.25, metalness:0.02 });
}

function createDomino(x, z, sizeKey) {
  const s = SIZES[sizeKey];
  const group = new THREE.Group();

  // 主体
  const geo = getGeo(s);
  const mat = createDominoMat(s);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = s.h / 2;
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  group.add(mesh);

  // 圆点
  const dotMat = new THREE.MeshStandardMaterial({ color:s.dotColor, roughness:0.5 });
  const dot = new THREE.Mesh(dotGeo, dotMat);
  dot.position.y = s.h - 0.15;
  dot.position.z = s.d / 2 + 0.005;
  group.add(dot);

  // 第二个圆点（下方）
  const dot2 = new THREE.Mesh(dotGeo, dotMat);
  dot2.position.y = s.h - 0.35;
  dot2.position.z = s.d / 2 + 0.005;
  group.add(dot2);

  group.position.set(x, 0, z);
  scene.add(group);

  const data = {
    mesh, group, size: sizeKey,
    baseX: x, baseZ: z,
    facing: 0, // 面朝方向角 (弧度, 0=+Z方向)
    angle: 0,  // 倾斜角 (0=直立, PI/2=完全倒下)
    angVel: 0,
    state: 'standing',
    selected: false,
  };
  dominoes.push(data);
  updateCounter();
  return data;
}

// ─── 选择要推的牌 ──────────────────────────
function selectDomino(idx) {
  if (falling) return;
  if (selectedIdx >= 0 && selectedIdx < dominoes.length) {
    dominoes[selectedIdx].selected = false;
    updateDominoVisual(selectedIdx);
  }
  if (idx === selectedIdx) {
    selectedIdx = -1;
  } else {
    selectedIdx = idx;
    dominoes[idx].selected = true;
    updateDominoVisual(idx);
  }
}

function updateDominoVisual(idx) {
  const d = dominoes[idx];
  const s = SIZES[d.size];
  const mat = d.mesh.material;
  if (d.selected) {
    mat.emissive = new THREE.Color(0xff6b35);
    mat.emissiveIntensity = 0.6;
  } else {
    mat.emissive = new THREE.Color(0x000000);
    mat.emissiveIntensity = 0;
  }
}

// ─── 物理 ──────────────────────────────────
const GRAVITY = 9.8;

function updatePhysics(dt) {
  dt = Math.min(dt, 0.05);

  for (const d of dominoes) {
    if (d.state !== 'falling') continue;

    const s = SIZES[d.size];
    const alpha = (3 * GRAVITY / (2 * s.h)) * Math.sin(Math.max(d.angle, 0.01));
    d.angVel += alpha * dt;
    d.angVel *= 0.998;
    d.angle += d.angVel * dt;

    // 检查是否碰到前方的牌（碰撞→靠在下一张上）
    let hitOther = null;
    let hitDist = Infinity;
    for (const other of dominoes) {
      if (other.state !== 'standing') continue;
      if (other === d) continue;

      const dx = other.baseX - d.baseX;
      const dz = other.baseZ - d.baseZ;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const dirTo = Math.atan2(dz, dx);

      const facingDiff = angDiffWrap(d.facing, dirTo);
      if (facingDiff > Math.PI/4) continue;

      const topDisp = s.h * Math.sin(d.angle);
      if (topDisp < dist * 0.5) continue; // 顶部还没够到

      if (dist < topDisp + s.d * 0.5 && dist < hitDist) {
        hitOther = other;
        hitDist = dist;
      }
    }

    if (hitOther && d.angVel > 0.02) {
      // 靠在下一张上：冻结当前角度
      const os = SIZES[hitOther.size];
      d.state = 'leaning';
      d.angVel = 0;

      // 启动下一张
      hitOther.state = 'falling';
      hitOther.angVel = 0.3 + Math.random() * 0.2;
      hitOther.angle = 0.02;
      hitOther.group.position.set(hitOther.baseX, 0, hitOther.baseZ);
      playChainSound();
      continue;
    }

    // 最后一张（后方无牌）：可以完全倒下
    if (d.angle >= Math.PI/2) {
      d.angle = Math.PI/2;
      d.angVel = 0;
      d.state = 'fallen';
    }

    // 更新3D旋转：绕局部X轴旋转（Three.js YXZ顺序，Y旋转=π/2-facing已预设）
    d.group.rotation.x = d.angle;

    if (d.state === 'fallen') {
      d.group.rotation.x = Math.PI / 2;
      d.group.position.y = s.d / 2;
    }
  }
}

function angDiffWrap(a, b) {
  let d = b - a;
  while (d > Math.PI) d -= 2*Math.PI;
  while (d < -Math.PI) d += 2*Math.PI;
  return Math.abs(d);
}

// ─── 推倒 ──────────────────────────────────
function doPush() {
  if (falling) return;
  if (selectedIdx < 0) {
    showMsg('先点击一张牌选中它');
    return;
  }
  const d = dominoes[selectedIdx];
  if (d.state !== 'standing') return;

  initAudio();
  playPushSound();
  falling = true;
  d.state = 'falling';
  d.angVel = 0.5;
  d.angle = 0.01;
  if (d.selected) {
    d.selected = false;
    updateDominoVisual(selectedIdx);
  }
  selectedIdx = -1;

  // 监控连锁结束
  checkDone();
}

function checkDone() {
  const timer = setInterval(() => {
    const anyActive = dominoes.some(d => d.state === 'falling');
    if (!anyActive) {
      clearInterval(timer);
      falling = false;
      const moved = dominoes.filter(d => d.state === 'falling' || d.state === 'leaning' || d.state === 'fallen').length;
      if (moved > 0) showMsg(moved + ' 块倒下 ✓');
    }
  }, 300);
}

// ─── 音效 ──────────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function tick(f, d, v, ty='sine') {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = ty; o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(f*0.3, t+d);
    g.gain.setValueAtTime(Math.min(v,0.1), t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t+d);
  } catch(e){}
}
function playPushSound() { tick(200, 0.15, 0.08, 'triangle'); }
function playChainSound() { tick(300+Math.random()*600, 0.03, 0.04); }
function playPlaceSound() { tick(800, 0.04, 0.04); }
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 1500);
}

// ─── 交互：点击放置 / 点击选中 ──────────────
const raycaster = new THREE.Raycaster();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

let touchStartTime = 0;
let touchStartPos = { x: 0, y: 0 };
let touchMoved = false;
let lastTapTime = 0;

canvas.addEventListener('pointerdown', e => {
  touchStartTime = Date.now();
  touchStartPos = { x: e.clientX, y: e.clientY };
  touchMoved = false;
});

canvas.addEventListener('pointermove', e => {
  if (Math.abs(e.clientX - touchStartPos.x) + Math.abs(e.clientY - touchStartPos.y) > 8) {
    touchMoved = true;
  }
});

canvas.addEventListener('pointerup', e => {
  if (touchMoved) return; // 是拖拽不是点击
  if (Date.now() - touchStartTime > 300) return; // 长按不算

  initAudio();
  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouse, camera);

  // 先检测是否点到了已有骨牌
  const meshIntersects = raycaster.intersectObjects(
    dominoes.map(d => d.mesh),
    true
  );
  if (meshIntersects.length > 0) {
    // 找到被点击的骨牌
    let hit = meshIntersects[0].object;
    while (hit && !dominoes.some(d => d.mesh === hit || d.group.children.includes(hit))) {
      hit = hit.parent;
    }
    const idx = dominoes.findIndex(d => d.mesh === hit || d.group.children.includes(hit));
    if (idx >= 0 && dominoes[idx].state === 'standing' && !falling) {
      selectDomino(idx);
      showMsg('已选中，点「推」开始');
      return;
    }
  }

  // 否则在桌面上放置
  const planeIntersect = new THREE.Vector3();
  const ray = raycaster.ray;
  if (ray.intersectPlane(tablePlane, planeIntersect)) {
    let px = THREE.MathUtils.clamp(planeIntersect.x, -2.8, 2.8);
    let pz = THREE.MathUtils.clamp(planeIntersect.z, -3.8, 3.8);

    // 放置约束：下一张只能放在上一张能压倒的范围内
    if (dominoes.length > 0) {
      const last = dominoes[dominoes.length - 1];
      const s = SIZES[last.size];
      const optDist = s.h * 0.82;
      const maxDist = s.h * 0.92; // 超过此距离压倒不了
      const minDist = s.w * 2;    // 最小间距（不能太近）

      const dx = px - last.baseX;
      const dz = pz - last.baseZ;
      const rawDist = Math.sqrt(dx*dx + dz*dz);
      const rawAngle = Math.atan2(dz, dx);

      // 距离约束：必须在压倒范围内
      const clampedDist = THREE.MathUtils.clamp(rawDist, minDist, maxDist);
      // 角度约束：facing ±25°
      const maxAngle = Math.PI / 7;
      const clampedAngle = last.facing + THREE.MathUtils.clamp(rawAngle - last.facing, -maxAngle, maxAngle);

      px = last.baseX + Math.cos(clampedAngle) * clampedDist;
      pz = last.baseZ + Math.sin(clampedAngle) * clampedDist;
      px = THREE.MathUtils.clamp(px, -2.8, 2.8);
      pz = THREE.MathUtils.clamp(pz, -3.8, 3.8);
    }

    const d = createDomino(px, pz, curSize);

    if (dominoes.length >= 2) {
      // 回补上一块牌的 facing，指向新放的这块
      const prev = dominoes[dominoes.length - 2];
      const lineDir = Math.atan2(pz - prev.baseZ, px - prev.baseX);
      prev.facing = lineDir;
      prev.group.rotation.y = Math.PI/2 - lineDir;
      // 新牌暂时沿用同一方向（下一块牌放置时会再更新）
      d.facing = lineDir;
      d.group.rotation.y = Math.PI/2 - lineDir;
    } else {
      d.facing = 0;
      d.group.rotation.y = Math.PI/2;
    }
    playPlaceSound();
    document.getElementById('hint').style.opacity = '0';
    updateGhost();
  }
});

// ─── 相机：单指旋转 ─────────────────────────
let camTheta = 0, camPhi = Math.PI/5;
let camDist = 7;
let camTarget = new THREE.Vector3(0, 0.3, 0);
let orbitDragging = false;
let orbitPrev = { x: 0, y: 0 };
let pinchStartDist = 0;

function updateCamera() {
  camera.position.set(
    camTarget.x + camDist * Math.sin(camPhi) * Math.sin(camTheta),
    camTarget.y + camDist * Math.cos(camPhi),
    camTarget.z + camDist * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(camTarget);
}
updateCamera();

canvas.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch' && (e.isPrimary || true)) {
    // for orbit, handled in move
  }
});

// 使用单独的touch handler处理双指
let touches = new Map();
canvas.addEventListener('touchstart', e => {
  for (const t of e.changedTouches) touches.set(t.identifier, { x: t.clientX, y: t.clientY });
  if (touches.size === 2) {
    orbitDragging = true;
    const pts = [...touches.values()];
    pinchStartDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touches.has(t.identifier)) {
      const old = touches.get(t.identifier);
      if (touches.size === 2 && orbitDragging) {
        // 双指：旋转+缩放
        touches.set(t.identifier, { x: t.clientX, y: t.clientY });
        const pts = [...touches.values()];
        const newDist = Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
        if (pinchStartDist > 0) {
          camDist *= pinchStartDist / newDist;
          camDist = THREE.MathUtils.clamp(camDist, 3, 15);
          pinchStartDist = newDist;
        }
        // 旋转
        if (old) {
          camTheta -= (t.clientX - old.x) * 0.005;
          camPhi -= (t.clientY - old.y) * 0.005;
          camPhi = THREE.MathUtils.clamp(camPhi, 0.2, Math.PI/2 - 0.1);
        }
        updateCamera();
        return;
      }
      touches.set(t.identifier, { x: t.clientX, y: t.clientY });
    }
  }
  // 单指旋转
  if (touches.size === 1 && !touchMoved) {
    const t = e.changedTouches[0];
    const old = touches.get(t.identifier);
    if (old) {
      camTheta -= (t.clientX - old.x) * 0.008;
      camPhi -= (t.clientY - old.y) * 0.008;
      camPhi = THREE.MathUtils.clamp(camPhi, 0.2, Math.PI/2 - 0.1);
      updateCamera();
    }
    touches.set(t.identifier, { x: t.clientX, y: t.clientY });
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) touches.delete(t.identifier);
  if (touches.size < 2) { orbitDragging = false; pinchStartDist = 0; }
});

// 鼠标滚轮缩放
canvas.addEventListener('wheel', e => {
  camDist *= 1 + e.deltaY * 0.001;
  camDist = THREE.MathUtils.clamp(camDist, 3, 15);
  updateCamera();
});

// ─── 参考线：显示骨牌间距 ──────────────────拉
let ghostLine = null;
function updateGhost() {
  if (ghostLine) { scene.remove(ghostLine); ghostLine = null; }
  if (!showGhost || dominoes.length < 2) return;

  const last = dominoes[dominoes.length - 1];
  const prev = dominoes[dominoes.length - 2];
  const s = SIZES[last.size];
  const dist = Math.hypot(last.baseX - prev.baseX, last.baseZ - prev.baseZ);
  const optimal = s.h * 0.85;

  const midX = (last.baseX + prev.baseX) / 2;
  const midZ = (last.baseZ + prev.baseZ) / 2;
  const dx = last.baseX - prev.baseX;
  const dz = last.baseZ - prev.baseZ;

  // 颜色：绿色=完美距离，黄色=偏近，红色=太远
  const ratio = dist / optimal;
  let lineColor;
  if (ratio < 0.7) lineColor = 0xffaa00; // 太近
  else if (ratio > 1.05) lineColor = 0xff3333; // 太远，可能断链
  else lineColor = 0x33ff66; // 完美

  const lineGeo = new THREE.BoxGeometry(dist, 0.01, 0.03);
  const lineMat = new THREE.MeshBasicMaterial({ color: lineColor, transparent: true, opacity: 0.7 });
  ghostLine = new THREE.Mesh(lineGeo, lineMat);
  ghostLine.position.set(midX, 0.09, midZ);
  ghostLine.rotation.y = Math.atan2(dz, dx);
  scene.add(ghostLine);
}
function toggleGhost() { showGhost = !showGhost; if (!showGhost && ghostLine) { scene.remove(ghostLine); ghostLine = null; } }

// ─── UI ─────────────────────────────────────
function setSize(key, btn) {
  curSize = key;
  document.querySelectorAll('#ui-top button.sel').forEach(b => b.classList.remove('sel'));
  if (btn) btn.classList.add('sel');
  updateGhost();
}

function updateCounter() {
  document.getElementById('counter').textContent = dominoes.length + ' 块';
  if (dominoes.length > 0) document.getElementById('hint').style.opacity = '0';
  updateGhost();
}

function clearAll() {
  if (falling) return;
  for (const d of dominoes) scene.remove(d.group);
  dominoes = [];
  selectedIdx = -1;
  if (ghostLine) { scene.remove(ghostLine); ghostLine = null; }
  updateCounter();
  updateGhost();
  document.getElementById('hint').style.opacity = '1';
}

function undoLast() {
  if (falling || dominoes.length === 0) return;
  const d = dominoes.pop();
  scene.remove(d.group);
  if (selectedIdx >= dominoes.length) selectedIdx = -1;
  updateCounter();
  updateGhost();
  if (dominoes.length === 0) document.getElementById('hint').style.opacity = '1';
}

// ─── 响应式 ─────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── 主循环 ─────────────────────────────────
let lastTime = performance.now();

function physicsStep() {
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  if (dt > 0 && dt < 0.2) updatePhysics(dt);
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  renderer.render(scene, camera);
}

// 物理用 setInterval（不受标签页后台限制）
setInterval(physicsStep, 16);
renderLoop();
</script>
</body>
