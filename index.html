<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>多米诺 · 解压</title>
<script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#1a3a2a; touch-action:none; user-select:none; -webkit-user-select:none; position:fixed; }
  #c { display:block; position:absolute; top:0; left:0; }
  #hint { position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,.25); font-size:17px; font-family:system-ui,-apple-system,sans-serif; z-index:5; pointer-events:none; transition:opacity .4s; text-align:center; line-height:1.6; }
  #counter { position:fixed; top:max(12px, env(safe-area-inset-top)); right:14px; color:rgba(255,255,255,.5); font-size:13px; font-family:'SF Mono',monospace; z-index:10; pointer-events:none; }
  #btn-push { position:fixed; right:18px; bottom:max(120px, calc(env(safe-area-inset-bottom) + 100px)); width:66px; height:66px; border-radius:50%; border:none; background:linear-gradient(135deg,#ff3b5c,#ff2d55); color:#fff; font-size:17px; font-weight:700; z-index:20; cursor:pointer; box-shadow:0 6px 24px rgba(255,45,85,.45); transition:transform .12s; letter-spacing:1px; }
  #btn-push:active { transform:scale(.9); }
  #btn-undo { position:fixed; left:16px; bottom:max(120px, calc(env(safe-area-inset-bottom) + 100px)); width:46px; height:46px; border-radius:50%; border:1.5px solid rgba(255,255,255,.25); background:rgba(0,0,0,.3); color:rgba(255,255,255,.6); font-size:15px; z-index:20; cursor:pointer; backdrop-filter:blur(10px); }
  #toolbar-wrap { position:fixed; bottom:max(10px, env(safe-area-inset-bottom)); left:0; right:0; z-index:10; pointer-events:none; }
  #toolbar { display:flex; gap:8px; padding:8px 12px; justify-content:center; align-items:center; pointer-events:auto; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  #toolbar button { border:none; border-radius:18px; padding:9px 16px; font-size:14px; font-weight:600; cursor:pointer; transition:all .12s; font-family:system-ui,-apple-system,sans-serif; white-space:nowrap; backdrop-filter:blur(10px); }
  #toolbar button:active { transform:scale(.94); }
  .preset { background:rgba(255,255,255,.1); color:rgba(255,255,255,.7); }
  .preset.active { background:#ff6b35; color:#fff; box-shadow:0 2px 10px rgba(255,107,53,.4); }
  #btn-clear { background:rgba(255,255,255,.08); color:rgba(255,255,255,.5); }
  #btn-fx { background:rgba(255,255,255,.08); color:rgba(255,255,255,.5); }
  #spacer { color:rgba(255,255,255,.2); font-size:12px; margin:0 2px; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hint">👆 在绿色桌面上滑动铺设骨牌<br><span style="font-size:13px;opacity:.7;">铺完点右下角「推」</span></div>
<div id="counter">0 / 200</div>
<button id="btn-undo" onclick="undo()">↩</button>
<button id="btn-push" onclick="push()">推</button>
<div id="toolbar-wrap">
  <div id="toolbar">
    <button class="preset active" onclick="setPreset(5,this)">5块</button>
    <button class="preset" onclick="setPreset(10,this)">10块</button>
    <button class="preset" onclick="setPreset(20,this)">20块</button>
    <button class="preset" onclick="setPreset(0,this)">自由</button>
    <span id="spacer">|</span>
    <button id="btn-clear" onclick="resetAll()">清空</button>
    <button id="btn-fx" onclick="toggleFx()" style="font-size:13px;">🔊</button>
  </div>
</div>

<script>
// ─── 全局 ───────────────────────────────────
const { Engine, World, Bodies, Body, Composite, Constraint, Events, Vector } = Matter;

// ─── 重力引擎 ───────────────────────────────
const engine = Engine.create({
  gravity: { x: 0, y: 1.5 },
  enableSleeping: false,
});
const world = engine.world;

// ─── 画布 ───────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ─── 地面（看不见但一直在，兜住倒下的骨牌）───
let groundBody = null;
function ensureGround() {
  if (groundBody) Composite.remove(world, groundBody);
  groundBody = Bodies.rectangle(W()/2, H() + 40, W() * 2, 80, {
    isStatic: true,
    friction: 0.6,
    label: 'ground',
  });
  Composite.add(world, groundBody);
}
ensureGround();
window.addEventListener('resize', ensureGround);

// ─── 音频 ───────────────────────────────────
let audioCtx = null;
let soundOn = true;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function toggleFx() { soundOn = !soundOn; document.getElementById('btn-fx').textContent = soundOn ? '🔊' : '🔇'; }

function tick(freq, dur, vol, type = 'sine') {
  if (!audioCtx || !soundOn) return;
  try {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + dur);
    gain.gain.setValueAtTime(Math.min(vol, 0.12), t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  } catch(e) {}
}
function sfxPlace()  { tick(900, 0.04, 0.05); }
function sfxPush()   { tick(200, 0.18, 0.1, 'triangle'); }
function sfxChain()  { tick(350 + Math.random() * 700, 0.03, 0.04); }
function sfxDone()   { tick(120, 0.25, 0.06, 'triangle'); }

// ─── 常量 ───────────────────────────────────
const D_W = 6;
const D_H = 28;
const MAX_N = 200;

// ─── 状态 ───────────────────────────────────
let allData = [];
let allBodies = [];
let allConstraints = [];
let pathPts = [];
let segMetas = [];
let dominoCount = 0;
let mode = 'idle';
let presetN = 5;

// ─── 绘图状态 ───────────────────────────────
let drawing = false;
let drawPts = [];

// ─── 工具 ───────────────────────────────────
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const lerp  = (a, b, t) => a + (b - a) * t;
function angDiff(a, b) { let d = b - a; while (d > Math.PI) d -= 2*Math.PI; while (d < -Math.PI) d += 2*Math.PI; return d; }

// ─── 生成骨牌位置 ───────────────────────────
function genPositions(sIdx, eIdx, count) {
  let totalLen = 0;
  const lens = [];
  for (let i = sIdx; i < eIdx; i++) {
    const d = dist(pathPts[i], pathPts[i+1]);
    lens.push(d);
    totalLen += d;
  }
  if (totalLen < 8) return [];

  const spacing = count > 0 ? totalLen / count : 22;
  const n = count > 0 ? count : Math.max(1, Math.floor(totalLen / spacing));
  if (n === 0) return [];

  const out = [];
  let segI = 0, segAcc = 0;
  for (let i = 0; i < n; i++) {
    const target = count > 0 ? (i + 0.5) * (totalLen / n) : i * spacing + spacing*0.5;
    while (segI < lens.length && segAcc + lens[segI] < target) { segAcc += lens[segI]; segI++; }
    if (segI >= lens.length) break;
    const loc = segI < lens.length && lens[segI] > 0 ? (target - segAcc) / lens[segI] : 0;
    const pi = sIdx + segI;
    if (pi + 1 >= pathPts.length) break;
    const x  = lerp(pathPts[pi].x, pathPts[pi+1].x, loc);
    const y  = lerp(pathPts[pi].y, pathPts[pi+1].y, loc);
    const dx = pathPts[pi+1].x - pathPts[pi].x;
    const dy = pathPts[pi+1].y - pathPts[pi].y;
    out.push({ x, y, dir: Math.atan2(dy, dx) });
  }
  return out;
}

// ─── 放置骨牌（底部钉住，顶部可转）─────────
function placeOne(x, y, angle, segIdx) {
  if (dominoCount >= MAX_N) return null;

  const body = Bodies.rectangle(x, y, D_W, D_H, {
    angle,
    friction: 0.5,
    frictionAir: 0.02,
    restitution: 0.005,
    density: 0.003,
    label: 'domino',
  });

  // 钉住底部：骨牌 angle 朝向 = 路径垂直方向
  // "底部" 是身体在面朝反方向的那一端
  // angle + π 方向 = 从中心指向底部
  const bx = x + Math.cos(angle + Math.PI) * (D_H/2);
  const by = y + Math.sin(angle + Math.PI) * (D_H/2);

  const pin = Constraint.create({
    pointA: { x: bx, y: by },
    bodyB: body,
    pointB: { x: 0, y: D_H/2 }, // body 坐标系中的底端
    length: 0,
    stiffness: 0.95,
    damping: 0.02,
  });

  Composite.add(world, [body, pin]);
  allBodies.push(body);
  allConstraints.push(pin);

  const data = {
    id: body.id,
    x, y,
    origAngle: angle,
    baseX: bx,
    baseY: by,
    fallen: false,
    body,
    pin,
    segIdx,
  };
  allData.push(data);
  dominoCount++;
  updateCounter();
  return data;
}

function placeSegment(positions, segIdx) {
  const out = [];
  for (const p of positions) {
    const d = placeOne(p.x, p.y, p.dir + Math.PI/2, segIdx);
    if (d) out.push(d);
  }
  if (out.length > 0) sfxPlace();
  return out;
}

// ─── 推倒 ───────────────────────────────────
function push() {
  if (mode === 'toppling' || allData.length === 0) return;
  initAudio();
  sfxPush();
  mode = 'toppling';

  const first = allData.find(d => !d.fallen);
  if (!first) { mode = 'idle'; return; }

  const body = first.body;

  // 解除约束让它自由倒下
  if (first.pin) { Composite.remove(world, first.pin); first.pin = null; }

  // 推倒方向 = 向路径前方（angle + π/2 = 面朝方向）
  const pushDir = first.origAngle + Math.PI/2;

  // 在顶部施加冲力 + 重力会完成剩下的事
  const tipX = body.position.x - Math.cos(first.origAngle + Math.PI) * (D_H/2);
  const tipY = body.position.y - Math.sin(first.origAngle + Math.PI) * (D_H/2);
  Body.applyForce(body, { x: tipX, y: tipY }, {
    x: Math.cos(pushDir) * 0.0004,
    y: Math.sin(pushDir) * 0.0004,
  });

  // 给一点初始角速度
  Body.setAngularVelocity(body, 0.08);

  // 监控连锁
  let lastCnt = -1;
  let stallCount = 0;
  const timer = setInterval(() => {
    let fresh = 0;
    for (const d of allData) {
      if (d.fallen) continue;
      const ad = Math.abs(angDiff(d.body.angle, d.origAngle));
      if (ad > 0.85) {
        d.fallen = true;
        fresh++;
        sfxChain();
        if (d.pin) { Composite.remove(world, d.pin); d.pin = null; }
      }
    }
    const totalFallen = allData.filter(d => d.fallen).length;

    if (totalFallen === allData.length) {
      clearInterval(timer);
      sfxDone();
      setTimeout(() => { mode = 'idle'; updateCounter(); }, 400);
    } else if (fresh === 0 && totalFallen === lastCnt) {
      stallCount++;
      if (stallCount > 6) {
        clearInterval(timer);
        for (const d of allData) { if (d.pin) { Composite.remove(world, d.pin); d.pin = null; } }
        setTimeout(() => { mode = 'idle'; }, 300);
      }
    } else {
      stallCount = 0;
    }
    lastCnt = totalFallen;
  }, 100);
}

// ─── 撤销 / 清空 ────────────────────────────
function undo() {
  if (mode === 'toppling' || segMetas.length === 0) return;
  const segIdx = segMetas.length - 1;
  const lastMeta = segMetas.pop();
  pathPts.splice(lastMeta.startIdx + 1);
  const toRemove = [];
  for (let i = allData.length-1; i >= 0; i--) {
    if (allData[i].segIdx === segIdx) toRemove.push(i);
  }
  for (const i of toRemove) {
    const d = allData[i];
    if (d.pin) Composite.remove(world, d.pin);
    Composite.remove(world, d.body);
    allBodies.splice(allBodies.indexOf(d.body), 1);
    if (d.pin) allConstraints.splice(allConstraints.indexOf(d.pin), 1);
    dominoCount--;
  }
  allData = allData.filter((_, i) => !toRemove.includes(i));
  updateCounter();
  if (pathPts.length === 0) document.getElementById('hint').style.opacity = '1';
}

function resetAll() {
  if (mode === 'toppling') return;
  for (const c of allConstraints) Composite.remove(world, c);
  for (const b of allBodies) Composite.remove(world, b);
  allBodies = [];
  allConstraints = [];
  allData = [];
  pathPts = [];
  segMetas = [];
  dominoCount = 0;
  updateCounter();
  document.getElementById('hint').style.opacity = '1';
}

function setPreset(n, btn) {
  presetN = n;
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function updateCounter() {
  document.getElementById('counter').textContent = dominoCount + ' / ' + MAX_N;
  if (dominoCount > 0) document.getElementById('hint').style.opacity = '0';
}

// ─── 触摸 / 鼠标画线 ────────────────────────
function evPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
function beginDraw(e) {
  if (mode !== 'idle') return;
  e.preventDefault();
  initAudio();
  let pos = evPos(e);
  if (pathPts.length > 0) {
    const last = pathPts[pathPts.length-1];
    if (dist(pos, last) < 30) pos = last;
  }
  drawing = true;
  drawPts = [pos];
}
function moveDraw(e) {
  if (!drawing || mode !== 'idle') return;
  e.preventDefault();
  drawPts.push(evPos(e));
}
function endDraw(e) {
  if (!drawing || mode !== 'idle') return;
  e.preventDefault();
  drawing = false;
  if (drawPts.length < 2) return;
  const simp = [drawPts[0]];
  for (let i = 1; i < drawPts.length; i++) {
    if (dist(drawPts[i], simp[simp.length-1]) > 4) simp.push(drawPts[i]);
  }
  if (simp.length < 2) return;

  const isNew = pathPts.length === 0;
  let sIdx;
  if (isNew) { pathPts.push(simp[0]); sIdx = 0; }
  else {
    const last = pathPts[pathPts.length-1];
    if (dist(simp[0], last) < 8) sIdx = pathPts.length-1;
    else { simp.unshift(last); sIdx = pathPts.length; }
  }
  for (let i = 1; i < simp.length; i++) pathPts.push(simp[i]);
  const eIdx = pathPts.length-1;
  const segI = segMetas.length;
  segMetas.push({ startIdx: sIdx, endIdx: eIdx });
  const positions = genPositions(sIdx, eIdx, presetN);
  if (positions.length > 0) placeSegment(positions, segI);
  drawPts = [];
}

canvas.addEventListener('touchstart', beginDraw, { passive: false });
canvas.addEventListener('touchmove',  moveDraw,  { passive: false });
canvas.addEventListener('touchend',   endDraw,   { passive: false });
canvas.addEventListener('mousedown',  beginDraw);
canvas.addEventListener('mousemove',  moveDraw);
canvas.addEventListener('mouseup',    endDraw);

// ─── 渲染 ───────────────────────────────────
function render() {
  const w = W(), h = H();
  ctx.clearRect(0, 0, w, h);

  // 毛毡桌面
  ctx.fillStyle = '#1b5e3b';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 100; i++) {
    ctx.fillStyle = `rgba(0,0,0,${0.02 + Math.random()*0.03})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 3, 3);
  }

  // 路径线
  for (const m of segMetas) {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath();
    ctx.moveTo(pathPts[m.startIdx].x, pathPts[m.startIdx].y);
    for (let i = m.startIdx+1; i <= m.endIdx; i++) ctx.lineTo(pathPts[i].x, pathPts[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 画线预览
  if (drawing && drawPts.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(drawPts[0].x, drawPts[0].y);
    for (let i = 1; i < drawPts.length; i++) ctx.lineTo(drawPts[i].x, drawPts[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 骨牌渲染
  for (const d of allData) {
    const b = d.body;
    ctx.save();
    ctx.translate(b.position.x, b.position.y);
    ctx.rotate(b.angle);

    if (d.fallen) {
      ctx.fillStyle = '#2a3d2e';
      ctx.shadowColor = 'rgba(0,0,0,.3)';
      ctx.shadowBlur = 4;
      ctx.fillRect(-D_H/2, -D_W/2, D_H, D_W);
      ctx.shadowBlur = 0;
    } else {
      // 站立的骨牌（象牙白 + 渐变模拟立体感）
      const grad = ctx.createLinearGradient(-D_W/2, 0, D_W/2, 0);
      grad.addColorStop(0, '#e8e0d5');
      grad.addColorStop(0.4, '#faf6ed');
      grad.addColorStop(1, '#d4ccc0');
      ctx.fillStyle = grad;
      ctx.shadowColor = 'rgba(0,0,0,.15)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 1;
      ctx.fillRect(-D_W/2, -D_H/2, D_W, D_H);
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      // 圆点
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(0, -D_H/2 + 7.5, 2.5, 0, Math.PI*2);
      ctx.fill();
      // 边框
      ctx.strokeStyle = 'rgba(170,160,145,.4)';
      ctx.lineWidth = 0.4;
      ctx.strokeRect(-D_W/2, -D_H/2, D_W, D_H);
    }

    ctx.restore();
  }

  requestAnimationFrame(render);
}

// ─── 物理循环 ───────────────────────────────
function update() {
  Engine.update(engine, 1000/60);
  requestAnimationFrame(update);
}

render();
update();
</script>
</body>
</html>
